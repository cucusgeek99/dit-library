services:

  # ── Base de données MySQL ────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: dit-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dit_library}
      MYSQL_USER: ${MYSQL_USER:-dituser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Backend FastAPI ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dit-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+mysqlconnector://${MYSQL_USER:-dituser}:${MYSQL_PASSWORD:-password}@db:3306/${MYSQL_DATABASE:-dit_library}
      - SECRET_KEY=${SECRET_KEY:-changeme_secret_key}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ── Frontend React/Vite (via Nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: dit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

# ── Volumes & Réseau ────────────────────────────────────────
volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
